services:
  mcp-wiki:
    build: .
    ports:
      # 호스트 8000은 다른 서비스(fico-mcp)가 사용 중이라 8800 사용
      - "8800:8000"
    volumes:
      # 서비스할 마크다운 문서 디렉토리 (호스트 경로를 바꿔서 사용)
      - ./wiki-docs:/docs:ro
      # 시설 정형 데이터 (생성: uv run mcp-wiki-import datas/*.csv -o facilities.db)
      - ./facilities.db:/data/facilities.db:ro
    environment:
      WIKI_FACILITIES_DB: /data/facilities.db
      # 외부 IP/도메인으로 접속 시 Host 헤더 허용 목록 (fastmcp DNS 리바인딩 보호).
      # localhost/127.0.0.1은 항상 허용. 원격 배포 주소를 여기에 추가.
      FASTMCP_HTTP_ALLOWED_HOSTS: '["221.168.33.119"]'
    restart: unless-stopped
