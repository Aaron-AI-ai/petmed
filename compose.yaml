services:
  mcp-wiki:
    build: .
    # 배포 대상 서버가 amd64 — Apple Silicon에서도 항상 amd64로 빌드/실행 (Rosetta 에뮬레이션)
    platform: linux/amd64
    ports:
      # 호스트 8000은 다른 서비스(fico-mcp)가 사용 중이라 8800 사용
      - "8800:8000"
    # wiki-docs/, facilities.db, 환경변수(FASTMCP_HTTP_ALLOWED_HOSTS 포함)는
    # 모두 이미지에 포함됨 (Dockerfile). 문서/데이터 갱신 = ./deploy.sh 재실행.
    restart: unless-stopped
