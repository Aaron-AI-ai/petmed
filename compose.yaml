services:
  mcp-wiki:
    build: .
    ports:
      # 호스트 8000은 다른 서비스(fico-mcp)가 사용 중이라 8800 사용
      - "8800:8000"
    volumes:
      # 서비스할 마크다운 문서 디렉토리 (호스트 경로를 바꿔서 사용)
      - ./wiki-docs:/docs:ro
      # 시설 정형 데이터 (생성: uv run mcp-wiki-import datas/*.csv -o facilities.db)
      - ./facilities.db:/data/facilities.db:ro
    environment:
      WIKI_FACILITIES_DB: /data/facilities.db
      # Host 헤더 검증(DNS 리바인딩 보호) 전체 허용 — 어떤 주소로 접속해도 응답.
      # 인증 없는 서버이므로 공개망 노출 시 방화벽/VPN으로 접근 제어할 것.
      FASTMCP_HTTP_ALLOWED_HOSTS: '["*"]'
    restart: unless-stopped
